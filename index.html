<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevZero - Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* لون غامق مثل ثيم البرمجة */
            color: white;
            display: flex;

        .container {

        }
        h1 { font-size: 22px; margin-bottom: 10px; }
        p { color: #8b949e; margin-bottom: 30px; }
        .link-card {

            padding: 15px;

            text-decoration: none;
            color: white;
            display: block;
            font-weight: 500;
            transition: 0.3s;
        }
        .link-card:hover {
            background-color: #30363d;
            border-color: #58a6ff;
