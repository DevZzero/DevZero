<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevZero - Project Hub</title>
    <style>
        :root {
            --bg-deep: #0a0512;
            --nebula-glow: #1a0b2e;
            --accent-blue: #58a6ff;
            --accent-green: #4cd137;
            --star-white: rgba(220, 210, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at center, var(--nebula-glow) 0%, var(--bg-deep) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: var(--star-white);
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--speed) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 20px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .logo-img {
            width: 110px;
            height: 110px;
            border-radius: 24px;
            margin-bottom: 25px;
            border: 2px solid rgba(88, 166, 255, 0.3);
            box-shadow: 0 0 25px rgba(88, 166, 255, 0.2);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-img:hover {
            transform: rotate(5deg) scale(1.1);
            border-color: var(--accent-blue);
        }

        h1 { font-size: 28px; margin: 0 0 10px 0; letter-spacing: 1px; font-weight: 700; }
        .tagline { 
            color: #8b949e; 
            font-size: 15px; 
            margin-bottom: 35px; 
            font-weight: 500; 
            line-height: 1.7; 
        }
        .instant-badge {
            color: var(--accent-green);
            display: block;
            margin-top: 5px;
            font-weight: bold;
        }

        .link-card {
            background: rgba(33, 38, 45, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 14px;
            text-decoration: none;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent-blue);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .store-btn {
            border-color: rgba(76, 209, 55, 0.3);
        }
        .store-btn:hover {
            border-color: var(--accent-green);
            background: rgba(76, 209, 55, 0.05);
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="container">
        <img src="icon.jpg" alt="DevZero Logo" class="logo-img">
        
        <h1>DevZero</h1>
        
        <p class="tagline">
            لا تدوّر وتتعب.. زبدة السكربتات وجودة تبيّض الوجه <br>
            <span class="instant-badge">⚡ التسليم فوري ومباشر بعد الدفع !</span>
        </p>

        <a href="https://devzero.rmz.gg/" class="link-card store-btn" target="_blank">
            🛒 متجر DevZero الرسمي
        </a>

        <a href="https://www.tiktok.com/@devzzero" class="link-card" target="_blank">
            📱 تابعنا على تيك توك
        </a>

        <a href="https://wa.me/966559441355?text=" class="link-card">
            🛠️ الدعم الفني والمساعدة
        </a>
    </div>

    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--speed', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
